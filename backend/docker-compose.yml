services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - seismic-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " echo 'Waiting for MinIO...'; until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin); do
        sleep 1;
      done; /usr/bin/mc mb myminio/seismic-bucket --ignore-existing; /usr/bin/mc anonymous set public myminio/seismic-bucket; echo 'Bucket seismic-bucket created successfully.'; exit 0; "
    networks:
      - seismic-net

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: custom-spark:3.5.5
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_URL=spark://spark-master:7077
      # Variables d'environnement pour l'accès S3A (MinIO)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - SPARK_DAEMON_JAVA_OPTS=-Dspark.hadoop.fs.s3a.endpoint=http://minio:9000 -Dspark.hadoop.fs.s3a.access.key=minioadmin -Dspark.hadoop.fs.s3a.secret.key=minioadmin -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./:/opt/spark-app
    networks:
      - seismic-net
    depends_on:
      - minio

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: custom-spark:3.5.5
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      # Variables d'environnement pour l'accès S3A (MinIO)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - SPARK_DAEMON_JAVA_OPTS=-Dspark.hadoop.fs.s3a.endpoint=http://minio:9000 -Dspark.hadoop.fs.s3a.access.key=minioadmin -Dspark.hadoop.fs.s3a.secret.key=minioadmin -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./:/opt/spark-app
    networks:
      - seismic-net
    depends_on:
      - spark-master
      - minio

  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: custom-spark:3.5.5
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      # Variables d'environnement pour l'accès S3A (MinIO)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - SPARK_DAEMON_JAVA_OPTS=-Dspark.hadoop.fs.s3a.endpoint=http://minio:9000 -Dspark.hadoop.fs.s3a.access.key=minioadmin -Dspark.hadoop.fs.s3a.secret.key=minioadmin -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./:/opt/spark-app
    networks:
      - seismic-net
    depends_on:
      - spark-master
      - minio

  mysql_db:
    image: mysql:5.7
    container_name: mysql_db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "seisme_data"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../front/seisme/seisme/seisme_data.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - seismic-net

networks:
  seismic-net:
    driver: bridge

volumes:
  minio_data:
    driver: local
  mysql_data:
    driver: local
